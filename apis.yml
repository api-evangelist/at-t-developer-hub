    name: AT&T Network Insights API
    description: >-
      Delivers performance metrics and device-level network data, providing
      developers with insights into network conditions, signal quality, and
      performance indicators for connected devices on the AT&T network.
    humanURL: https://devex-web.att.com/developer-hub/
    baseURL: https://api.att.com
    tags:
