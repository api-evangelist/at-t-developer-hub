aid: at-t-developer-hub
name: AT&T Developer Hub
description: >-
  The AT&T Developer Hub provides access to cutting-edge network APIs including
  5G, edge computing, and CAMARA industry-standard APIs. The Network API
  Accelerator Program offers early adopters pre-release, invite-only access to
  network capabilities spanning device status, SIM swap detection, number
  verification, quality of service on demand, network insights, and mobility
  threat detection. AT&T's network APIs enable developers to build advanced
  applications leveraging the U.S. mobile network for authentication, fraud
  prevention, performance optimization, and security.
