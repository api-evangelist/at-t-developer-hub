  - type: Features
    data:
      - name: CAMARA Industry-Standard APIs
        description: >-
          Implements GSMA CAMARA open-source standard APIs including SIM Swap,
          Device Status, Number Verification, and Quality on Demand for
          cross-carrier interoperability.
      - name: Network API Accelerator Program
        description: >-
          Invite-only early access program for developers to trial pre-release
          5G network APIs and influence future network capability development.
      - name: 5G Network Capabilities
        description: >-
          Exposes AT&T's 5G network intelligence including QoS on demand,
          network performance insights, and device connectivity status.
      - name: Fraud Prevention Network Signals
        description: >-
          Network-based fraud signals including SIM swap detection, number
          verification, and mobility threat detection to strengthen app security.
  - type: UseCases
    data:
      - name: SIM Swap Fraud Prevention
        description: >-
          Detect recent SIM card changes to prevent account takeover attacks
          and strengthen multi-factor authentication flows.
      - name: Frictionless Mobile Authentication
        description: >-
          Verify device phone numbers silently via the network without OTP codes,
          reducing authentication friction in mobile apps.
      - name: 5G Quality of Service Optimization
        description: >-
          Request guaranteed bandwidth or low latency for real-time applications
          like video conferencing, AR/VR, and industrial IoT.
      - name: Device Connectivity Monitoring
        description: >-
          Monitor device connectivity and roaming status to trigger
          location-aware application behaviors.
      - name: Threat Detection and Security
        description: >-
          Leverage AT&T network ML-based threat signals to detect anomalous
          device behavior and security incidents.
  - type: Integrations
    data:
      - name: Aduna Network API Platform
        description: >-
          AT&T's partnership with Aduna provides standardized access to AT&T
          5G Network APIs with cross-carrier interoperability for all three
          major U.S. carriers.
      - name: Vonage (Ericsson)
        description: >-
          Collaboration with Vonage to bring AT&T CAMARA network APIs to
          communications platform developers.
      - name: GSMA CAMARA
        description: >-
          Member of GSMA's CAMARA open-source project defining standardized
          telco network APIs for cross-operator portability.
