        url: https://devex-web.att.com/developer-hub/
      - type: GettingStarted
        url: https://devex-web.att.com/developer-hub/docs/network-api-accelerator-program
      - type: OpenAPI
        url: openapi/at-t-developer-hub-mobility-threat-anomaly-detection-api.yaml
  - aid: at-t-developer-hub:att-sim-swap-api
    name: AT&T SIM Swap API
    description: >-
      CAMARA-standard API that checks when SIM cards associated with mobile
      numbers have changed. Enables applications to strengthen authentication
      flows and detect SIM swap fraud by querying AT&T's network for recent
      SIM card changes on a subscriber's number.
    humanURL: https://devex-web.att.com/developer-hub/
    baseURL: https://api.att.com
    tags:
      - SIM Swap
      - Authentication
      - Fraud Prevention
      - CAMARA
      - Security
    properties:
      - type: Documentation
        url: https://devex-web.att.com/developer-hub/
      - type: GettingStarted
        url: https://devex-web.att.com/developer-hub/docs/network-api-accelerator-program
      - type: OpenAPI
        url: openapi/at-t-developer-hub-sim-swap-api.yaml
  - aid: at-t-developer-hub:att-device-status-api
    name: AT&T Device Status API
    description: >-
      CAMARA-standard API that checks the connectivity status of user equipment,
      including roaming information. Enables applications to determine if a device
      is reachable, connected, and whether it is roaming on a partner network,
      supporting location-aware and connectivity-sensitive application logic.
    humanURL: https://devex-web.att.com/developer-hub/
    baseURL: https://api.att.com
    tags:
      - Device Status
      - Connectivity
      - Roaming
      - CAMARA
      - 5G
    properties:
      - type: Documentation
        url: https://devex-web.att.com/developer-hub/
      - type: GettingStarted
        url: https://devex-web.att.com/developer-hub/docs/network-api-accelerator-program
      - type: OpenAPI
        url: openapi/at-t-developer-hub-device-status-api.yaml
  - aid: at-t-developer-hub:att-quality-on-demand-api
    name: AT&T Quality on Demand API
    description: >-
      CAMARA-standard Quality of Service on Demand (QoD) API that temporarily
      enhances Quality of Service on 5G PDU sessions. Enables applications to
      request prioritized network throughput, reduced latency, or guaranteed
      bandwidth for time-sensitive operations like video streaming, gaming,
      remote surgery, or industrial automation.
    humanURL: https://devex-web.att.com/developer-hub/
    baseURL: https://api.att.com
    tags:
      - Quality of Service
      - QoS
      - 5G
      - CAMARA
      - Network Slicing
      - Latency
    properties:
      - type: Documentation
        url: https://devex-web.att.com/developer-hub/
      - type: GettingStarted
        url: https://devex-web.att.com/developer-hub/docs/network-api-accelerator-program
      - type: OpenAPI
        url: openapi/at-t-developer-hub-quality-on-demand-api.yaml
  - aid: at-t-developer-hub:att-number-verification-api
    name: AT&T Number Verification API
    description: >-
      CAMARA-standard API enabling seamless device authentication via the mobile
      network. Verifies that a device is currently using a specific phone number
      without requiring the user to enter an OTP, leveraging the AT&T network
      signal for frictionless identity verification in mobile applications.
    humanURL: https://devex-web.att.com/developer-hub/
    baseURL: https://api.att.com
    tags:
      - Number Verification
      - Authentication
      - Identity
      - CAMARA
      - Mobile
    properties:
