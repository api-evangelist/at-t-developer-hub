  - aid: at-t-developer-hub:att-mobility-threat-anomaly-detection-api
    name: AT&T Mobility Threat and Anomaly Detection API
    description: >-
      Uses machine learning to identify threats and unusual activity on mobile
      devices on the AT&T network. Provides real-time threat detection signals
      to applications for enhanced security, fraud prevention, and anomaly
      detection across subscriber devices.
    humanURL: https://devex-web.att.com/developer-hub/
    baseURL: https://api.att.com
    tags:
      - Security
