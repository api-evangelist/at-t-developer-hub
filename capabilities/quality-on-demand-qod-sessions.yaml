    namespace: quality-on-demand-qod-sessions
    baseUri: https://api.att.com/camara/qod/v1
    description: AT&T Quality on Demand API — QoD Sessions business capability. Self-contained, no shared references.
    resources:
    - name: sessions
      path: /sessions
      operations:
      - name: createqodsession
        method: POST
        description: AT&T Create QoD Session
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: true
      - name: listqodsessions
        method: GET
        description: AT&T List QoD Sessions
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: sessions-sessionId
      path: /sessions/{sessionId}
      operations:
      - name: getqodsession
        method: GET
        description: AT&T Get QoD Session
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: sessionId
          in: path
          type: string
          description: Unique QoD session identifier
          required: true
      - name: deleteqodsession
        method: DELETE
        description: AT&T Delete QoD Session
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: sessionId
          in: path
          type: string
          description: Unique QoD session identifier
          required: true
