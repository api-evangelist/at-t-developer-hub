naftiko: "1.0.0-alpha1"

info:
  label: "AT&T Device Status API"
  description: "CAMARA-standard device connectivity and roaming status API for checking AT&T subscriber device connection states."
  tags:
    - AT&T
    - Device Status
    - CAMARA
    - Connectivity
    - Roaming
  created: "2026-04-19"
  modified: "2026-04-19"

binds:
  - namespace: env
    keys:
      ATT_NETWORK_API_TOKEN: ATT_NETWORK_API_TOKEN

capability:
  consumes:
    - type: http
      namespace: att-device-status
      baseUri: https://api.att.com/camara/device-status/v1
      description: "AT&T Device Status API"
      authentication:
        type: bearer
        token: "{{ATT_NETWORK_API_TOKEN}}"
      resources:
        - name: connectivity
          path: /connectivity
          description: "Device connectivity status"
          operations:
            - name: get-connectivity-status
              method: POST
              description: "Get device connectivity status"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
              body:
                type: json
                data:
                  phoneNumber: "{{tools.phoneNumber}}"
        - name: roaming
          path: /roaming
          description: "Device roaming status"
          operations:
            - name: get-roaming-status
              method: POST
              description: "Get device roaming status"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
              body:
                type: json
                data:
                  phoneNumber: "{{tools.phoneNumber}}"

  exposes:
    - type: rest
      port: 8111
      namespace: att-device-status-rest
      resources:
        - path: /v1/devices/connectivity
          name: connectivity
          description: "Device connectivity status"
          operations:
            - method: POST
              name: get-connectivity-status
              description: "Get device connectivity status"
              call: "att-device-status.get-connectivity-status"
              with:
                phoneNumber: "rest.phoneNumber"
              outputParameters:
                - type: object
                  mapping: "$."

    - type: mcp
      port: 9111
      namespace: att-device-status-mcp
      transport: http
      tools:
        - name: get-device-connectivity-status
          description: "Check if an AT&T subscriber device is connected and determine connection type"
          hints:
            readOnly: true
            idempotent: true
          call: "att-device-status.get-connectivity-status"
          with:
            phoneNumber: "tools.phoneNumber"
          outputParameters:
            - type: object
              mapping: "$."
        - name: get-device-roaming-status
          description: "Check if an AT&T subscriber device is currently roaming on a partner network"
          hints:
            readOnly: true
            idempotent: true
          call: "att-device-status.get-roaming-status"
          with:
            phoneNumber: "tools.phoneNumber"
          outputParameters:
            - type: object
              mapping: "$."
