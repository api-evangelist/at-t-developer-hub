naftiko: "1.0.0-alpha1"

info:
  label: "AT&T Quality on Demand API"
  description: "CAMARA-standard QoD API for requesting enhanced 5G network quality sessions for specific devices and applications."
  tags:
    - AT&T
    - Quality of Service
    - QoD
    - CAMARA
    - 5G
  created: "2026-04-19"
  modified: "2026-04-19"

binds:
  - namespace: env
    keys:
      ATT_NETWORK_API_TOKEN: ATT_NETWORK_API_TOKEN

capability:
  consumes:
    - type: http
      namespace: att-qod
      baseUri: https://api.att.com/camara/qod/v1
      description: "AT&T Quality on Demand API"
      authentication:
        type: bearer
        token: "{{ATT_NETWORK_API_TOKEN}}"
      resources:
        - name: sessions
          path: /sessions
          description: "QoD session management"
          operations:
            - name: create-session
              method: POST
              description: "Create QoD session for enhanced network quality"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
              body:
                type: json
                data:
                  phoneNumber: "{{tools.phoneNumber}}"
                  qosProfile: "{{tools.qosProfile}}"
                  duration: "{{tools.duration}}"
            - name: list-sessions
              method: GET
              description: "List active QoD sessions"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
        - name: session-detail
          path: /sessions/{sessionId}
          description: "Individual QoD session"
          operations:
            - name: get-session
              method: GET
              description: "Get QoD session details"
              inputParameters:
                - name: sessionId
                  in: path
                  type: string
                  required: true
                  description: "Session ID"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
            - name: delete-session
              method: DELETE
              description: "Terminate QoD session"
              inputParameters:
                - name: sessionId
                  in: path
                  type: string
                  required: true
                  description: "Session ID"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."

  exposes:
    - type: rest
      port: 8113
      namespace: att-qod-rest
      resources:
        - path: /v1/qod/sessions
          name: qod-sessions
          description: "QoD session management"
          operations:
            - method: POST
              name: create-qod-session
              description: "Create enhanced QoS session"
              call: "att-qod.create-session"
              with:
                phoneNumber: "rest.phoneNumber"
                qosProfile: "rest.qosProfile"
                duration: "rest.duration"
              outputParameters:
                - type: object
                  mapping: "$."

    - type: mcp
      port: 9113
      namespace: att-qod-mcp
      transport: http
      tools:
        - name: create-qod-session
          description: "Create a Quality of Service on Demand session to temporarily enhance 5G network quality for a device"
          hints:
            readOnly: false
            destructive: false
          call: "att-qod.create-session"
          with:
            phoneNumber: "tools.phoneNumber"
            qosProfile: "tools.qosProfile"
            duration: "tools.duration"
          outputParameters:
            - type: object
              mapping: "$."
        - name: list-qod-sessions
          description: "List active Quality on Demand sessions for the application"
          hints:
            readOnly: true
            idempotent: true
          call: "att-qod.list-sessions"
          outputParameters:
            - type: object
              mapping: "$."
        - name: get-qod-session
          description: "Get details and status of a specific Quality on Demand session"
          hints:
            readOnly: true
            idempotent: true
          call: "att-qod.get-session"
          with:
            sessionId: "tools.sessionId"
          outputParameters:
            - type: object
              mapping: "$."
        - name: delete-qod-session
          description: "Terminate an active Quality on Demand session and return network quality to normal"
          hints:
            readOnly: false
            destructive: true
            idempotent: true
          call: "att-qod.delete-session"
          with:
            sessionId: "tools.sessionId"
          outputParameters:
            - type: object
              mapping: "$."
