naftiko: "1.0.0-alpha1"

info:
  label: "AT&T Number Verification API"
  description: "CAMARA-standard number verification API enabling silent device authentication using AT&T network signals."
  tags:
    - AT&T
    - Number Verification
    - CAMARA
    - Authentication
    - Identity
  created: "2026-04-19"
  modified: "2026-04-19"

binds:
  - namespace: env
    keys:
      ATT_NETWORK_API_TOKEN: ATT_NETWORK_API_TOKEN

capability:
  consumes:
    - type: http
      namespace: att-number-verification
      baseUri: https://api.att.com/camara/number-verification/v1
      description: "AT&T Number Verification API"
      authentication:
        type: bearer
        token: "{{ATT_NETWORK_API_TOKEN}}"
      resources:
        - name: verify
          path: /verify
          description: "Phone number verification"
          operations:
            - name: verify-phone-number
              method: POST
              description: "Silently verify device phone number via network"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
              body:
                type: json
                data:
                  phoneNumber: "{{tools.phoneNumber}}"

  exposes:
    - type: rest
      port: 8112
      namespace: att-number-verification-rest
      resources:
        - path: /v1/number-verification/verify
          name: verify
          description: "Phone number verification"
          operations:
            - method: POST
              name: verify-number
              description: "Verify device phone number"
              call: "att-number-verification.verify-phone-number"
              with:
                phoneNumber: "rest.phoneNumber"
              outputParameters:
                - type: object
                  mapping: "$."

    - type: mcp
      port: 9112
      namespace: att-number-verification-mcp
      transport: http
      tools:
        - name: verify-phone-number
          description: "Silently verify that a device is associated with a phone number using AT&T network authentication"
          hints:
            readOnly: true
            idempotent: true
          call: "att-number-verification.verify-phone-number"
          with:
            phoneNumber: "tools.phoneNumber"
          outputParameters:
            - type: object
              mapping: "$."
