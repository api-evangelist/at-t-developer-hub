specification: API Commons Rate Limits
specificationVersion: '0.1'
schema: https://raw.githubusercontent.com/api-evangelist/interface-research/main/schema/api-commons.yml#/$defs/RateLimits
provider: AT&T Developer Hub
providerId: at-t-developer-hub
created: '2026-05-04'
modified: '2026-05-05'
reconciled: false
tags:
  - 5G
  - Network APIs
  - CAMARA
  - Connectivity
  - Telecommunications
  - Edge Computing
  - Rate Limiting
description: AT&T's Network API Accelerator is invite-only and does not publish a public rate-limit
  table. Per-account quotas and per-second throttles are set per onboarded partner. CAMARA APIs return
  standard 429 throttling and 503 service-unavailable codes per the CAMARA spec.
sources:
  - https://developer.att.com/
  - https://camaraproject.org/
notes: No public canonical rate-limit table. Expect partner-specific quotas negotiated at onboarding.
  CAMARA-spec response semantics apply.
responseCodes:
  throttled: 429
  quotaExceeded: 429
  serviceUnavailable: 503
limits:
  - name: Network API Accelerator (per-partner)
    scope: account
    metric: varies
    limit: per-partner quotas set during onboarding; not publicly published
    notes: Throughput envelope determined per accelerator participant.
policies:
  - name: CAMARA Conformance
    description: APIs follow CAMARA-standard error/throttling semantics; clients should respect 429
      Retry-After.
  - name: Backoff Strategy
    description: Use exponential backoff with jitter on 429/503 responses.
  - name: Partner-Specific Onboarding
    description: Concrete per-second / per-day numbers are issued to each accelerator partner at
      onboarding rather than published on a public docs page.
maintainers:
  - FN: Kin Lane
    email: kin@apievangelist.com
    url: https://apievangelist.com
