description: AT&T's Network API Accelerator Program is currently invite-only (early-adopter / pre-release)
  for CAMARA-based network APIs (Device Status, SIM Swap, Number Verification, Quality on Demand, Network
  Insights, Mobility Threat Detection). AT&T does not publish standard per-call pricing; access and
  commercials are negotiated bilaterally with the program team.
sources:
  - https://developer.att.com/
notes: Pre-release / invite-only program. Public price list does not exist as of the modified date.
  Expect commercial terms similar to other CAMARA carriers (per-call or volume-tier pricing) once the
  program reaches GA.
plans:
  - id: at-t-developer-hub-accelerator
    name: Network API Accelerator (Invite-Only)
    type: enterprise
    description: Pre-release access to CAMARA network APIs through AT&T's Network API Accelerator Program.
      Commercials negotiated bilaterally.
    entries:
      - label: Pre-Release API Access
        name: api_access
        type: subscription
        metric: varies
        limit: -1
        timeFrame: month
        geo: US
        unit: 1
        price: custom (invite-only program; contact AT&T)
        userMultiplied: false
    elements:
      - name: Device Status API (CAMARA)
      - name: SIM Swap Detection API (CAMARA)
      - name: Number Verification API (CAMARA)
      - name: Quality on Demand API (CAMARA)
      - name: Network Insights API
      - name: Mobility Threat Detection API
