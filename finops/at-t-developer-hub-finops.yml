description: FOCUS-aligned FinOps shape for AT&T Network APIs (CAMARA). The program is invite-only
  and pre-GA; public pricing is not available. Consumers should anticipate per-call and/or volume-tier
  commercials common across CAMARA carriers and instrument meters in advance.
sources:
  - https://developer.att.com/
  - https://camaraproject.org/
  - https://focus.finops.org/focus-specification/v1-3/
notes: Pre-GA / invite-only; commercials TBD. Meters below describe the expected billable axes for
  CAMARA-style network APIs so consumers can build instrumentation before contract.
alignedWith:
  framework: FinOps Foundation Framework
  frameworkUrl: https://www.finops.org/framework/
  dataSpec: FOCUS
  dataSpecVersion: '1.3'
  dataSpecUrl: https://focus.finops.org/focus-specification/v1-3/
publisherName: AT&T Services, Inc.
serviceCategory: Telecommunications / Network APIs
billingModel:
  pricingCategory: Pay-As-You-Go (anticipated)
  billingFrequency: Monthly (anticipated)
  billingCurrency: USD
  chargeCategories:
    - Usage
    - Tax
    - Adjustment
focusColumns:
  ServiceName: AT&T Network APIs
  ServiceCategory: Telecommunications
  ServiceSubcategory: Network APIs (CAMARA)
  ProviderName: AT&T
  PublisherName: AT&T Services, Inc.
  InvoiceIssuerName: AT&T Services, Inc.
  BillingCurrency: USD
  PricingCategory: Pay-As-You-Go
meters:
  - name: api_calls
    description: Count of CAMARA API requests (Device Status, SIM Swap, Number Verification, etc.)
    unit: request
    aggregation: sum
    dimensions:
      - api
      - country
      - partner
  - name: verifications
    description: Successful network verifications (SIM swap, number verify) — likely a billable
      success-only line
    unit: verification
    aggregation: sum
    dimensions:
      - api
      - outcome
  - name: qod_sessions
    description: Quality-on-Demand session count and duration
    unit: session
    aggregation: sum
    dimensions:
      - profile
  - name: qod_session_duration
    description: Quality-on-Demand active duration
    unit: minute
    aggregation: sum
    dimensions:
      - profile
principles:
  - name: Visibility
    description: Once GA, expect AT&T to expose a developer console with usage dashboards; pre-GA,
      maintain client-side counters per CAMARA API and per outcome.
  - name: Allocation
    description: Tag every CAMARA call with consuming product / fraud-prevention surface in your own
      app telemetry to support showback before AT&T's invoice arrives.
  - name: Optimization
    description: For SIM-swap and number-verify, batch user enrollment events; for QoD, tear down
      sessions promptly. Avoid speculative pre-flight calls during low-risk transactions.
  - name: Accountability
    description: Fraud / risk and identity engineering teams typically own CAMARA spend; pair with
      finance on per-verification ROI vs fraud loss avoided.
maintainers:
